apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tracing
      microservice: jaeger
  template:
    metadata:
      labels:
        app: tracing
        microservice: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.9
          ports:
            - containerPort: 16686
              protocol: TCP
            - containerPort: 6831
              protocol: UDP
            - containerPort: 4318
              protocol: TCP
            - containerPort: 4317
              protocol: UDP