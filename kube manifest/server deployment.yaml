apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tracing
      microservice: server
  template:
    metadata:
      labels:
        app: tracing
        microservice: server
    spec:
      containers:
        - name: server
          image: gowthamarumugam/tracing-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: BACKEND_HOSTs
              value: "https://api.restful-api.dev"