service:
  client:
    build: java-client/
    ports:
      - "8081:8081"
    networks:
      - my-network
    depends_on:
      - server
  server:
    build: java-server/
    ports:
      - "8082:8082"
    networks:
      - my-network
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "6831:6831/udp"
      - "16686:16686"
    networks:
      - my-network
networks:
  my-network:
    driver: bridge