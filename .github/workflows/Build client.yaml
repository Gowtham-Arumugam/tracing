name: build and push - Client
on: 
  push:
    branches:
      - main
    paths:
      - 'jaeger-client/**'
      - '.github/workflows/Build client.yaml'
  workflow_dispatch:
jobs:
  build-and-push:
    environment: General
    name: Build and push docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: maven
      - run: cd jaeger-client && mvn test compile package
      - name: Build Docker Image
        run: docker build -t ${{ vars.DOCKER_USERNAME }}/observability-client:${{ github.run_number}} jaeger-client/
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push Docker Image
        run: docker push ${{ vars.DOCKER_USERNAME }}/observability-client:${{ github.run_number}}